# Postgres-backed pool-daemon config used by deploy/docker-compose.yml.
# This file uses the namespaced [ladon] format with a shared [stores] section.

[ladon]
store = "ladon"

[ladon.derive.secret]
kind = "env"
var = "LADON_MNEMONIC"

[[ladon.derive.chains]]
name = "evm"
chain = "ethereum-mainnet"
# start_index = 1

[[ladon.derive.chains]]
name = "solana"
chain = "solana-mainnet"
solana_mode = "cold-export"
# start_index = 1

[[ladon.derive.chains]]
name = "btc"
chain = "bitcoin-mainnet"
network = "bitcoin"
# start_index = 1

[ladon.pool]
target = 10
threshold = 5
batch = 5
interval_secs = 10

[ladon.table]
name = "derived_addresses"

[ladon.table.columns]
id = "id"
chain = "chain"
address = "address"
path = "path"
index = "index"
is_used = "is_used"
created_at = "created_at"

[stores.ladon]
driver = "postgres"
url = "${DATABASE_URL}"
max_connections = 5

[chains.ethereum-mainnet]
caip2 = "eip155:1"

[chains.solana-mainnet]
caip2 = "solana:mainnet"

[chains.bitcoin-mainnet]
caip2 = "bip122:000000000019d6689c085ae165831e93"
