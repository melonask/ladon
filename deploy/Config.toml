# Postgres-backed pool-daemon config used by deploy/docker-compose.yml.
# This file uses the namespaced [ladon] format with a shared [stores] section.

[ladon]
store = "ladon"

[ladon.derive.secret]
kind = "env"
var = "LADON_MNEMONIC"

[[ladon.derive.chains]]
name = "evm"
# start_index = 1

[[ladon.derive.chains]]
name = "solana"
solana_mode = "cold-export"
# start_index = 1

[[ladon.derive.chains]]
name = "btc"
network = "bitcoin"
# start_index = 1

[ladon.pool]
target = 10
threshold = 5
batch = 5
interval_secs = 10

[ladon.table]
name = "derived_addresses"

[ladon.table.columns]
id = "id"
chain = "chain"
address = "address"
path = "path"
index = "index"
is_used = "is_used"
created_at = "created_at"

[stores.ladon]
driver = "postgres"
url = "${DATABASE_URL}"
max_connections = 5
connect_timeout_secs = 10
