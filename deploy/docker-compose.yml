services:
  # ── Postgres (optional; remove if using SQLite) ──────────────────────────────
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── ladon pool daemon ─────────────────────────────────────────────────────────
  ladon:
    image: ${LADON_IMAGE:?set LADON_IMAGE to the published container image}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Provide the mnemonic via the environment; never bake secrets into the image.
      LADON_MNEMONIC: "${LADON_MNEMONIC:?set LADON_MNEMONIC}"
      # Provide the full shared-store URL through the environment or Compose secrets.
      DATABASE_URL: "${DATABASE_URL:?set DATABASE_URL}"
      LADON_CONFIG: "/app/Config.toml"
      # Adjust log verbosity: error | warn | info | debug | trace
      RUST_LOG: "ladon=info"
    volumes:
      - ./Config.toml:/app/Config.toml:ro
      # Only needed for the SQLite backend:
      # - ./data:/app/data

volumes:
  pgdata:
