name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2.9.1

      - name: Check formatting
        run: cargo fmt --check

      - name: Check
        run: cargo check --all-targets --all-features

      - name: Lint with clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-targets --all-features

  docker-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Build and smoke-test Docker image
        run: |
          docker build --no-cache --tag ladon:ci .
          docker run --rm ladon:ci --help | grep --fixed-strings 'Fast multi-chain HD wallet CLI and address-pool daemon'

          config_dir="$(mktemp --directory)"
          trap 'rm -rf "$config_dir"' EXIT
          cat > "$config_dir/sqlite.toml" <<'EOF'
          [stores.ladon]
          driver = "sqlite"
          url = "sqlite:///tmp/ladon.db"

          [chains.ethereum-mainnet]
          caip2 = "eip155:1"

          [ladon]
          store = "ladon"

          [ladon.derive.secret]
          kind = "env"
          var = "LADON_MNEMONIC"

          [[ladon.derive.chains]]
          name = "evm"
          chain = "ethereum-mainnet"

          [ladon.pool]
          target = 10
          threshold = 5
          batch = 5
          interval_secs = 1
          EOF
          cat > "$config_dir/postgres.toml" <<'EOF'
          [stores.ladon]
          driver = "postgres"
          url = "${DATABASE_URL}"

          [chains.ethereum-mainnet]
          caip2 = "eip155:1"

          [ladon]
          store = "ladon"

          [ladon.derive.secret]
          kind = "env"
          var = "LADON_MNEMONIC"

          [[ladon.derive.chains]]
          name = "evm"
          chain = "ethereum-mainnet"

          [ladon.pool]
          target = 10
          threshold = 5
          batch = 5
          interval_secs = 1
          EOF

          docker run --rm \
            --env LADON_MNEMONIC='abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about' \
            --volume "$config_dir/sqlite.toml:/tmp/config.toml:ro" \
            ladon:ci --config /tmp/config.toml check | grep --fixed-strings 'configuration valid: store_driver=sqlite'
          docker run --rm \
            --env LADON_MNEMONIC='abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about' \
            --env DATABASE_URL='postgres://ladon:ladon@localhost:5432/ladon' \
            --volume "$config_dir/postgres.toml:/tmp/config.toml:ro" \
            ladon:ci --config /tmp/config.toml check | grep --fixed-strings 'configuration valid: store_driver=postgres'

  test-msrv:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: ["1.97.0", stable, beta]

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      - uses: Swatinem/rust-cache@v2.9.1

      - name: Check
        run: cargo check --all-targets --all-features

      - name: Run tests
        run: cargo test --all-targets --all-features

  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - uses: dtolnay/rust-toolchain@stable

        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2.9.1

      - name: Verify crate package
        run: cargo package --allow-dirty --verbose
