# ── ladon Config.toml ──────────────────────────────────────────────────────────
# This is Ladon's universal configuration example. It works with:
#   LADON_CONFIG=Config.toml ladon check
#
# In a multi-package deployment this is merged into the universal Config.toml.
# Ladon requires [ladon] and the selected shared [stores.<id>] entry.

# ── Ladon namespace ────────────────────────────────────────────────────────────

[ladon]
# Store id from the required shared [stores] namespace.
store = "ladon"

# ── Derivation ──────────────────────────────────────────────────────────────────

[ladon.derive]
# How to obtain the master secret.  Supported "kind" values:
#   "env"        — mnemonic from an environment variable
#   "xpriv_env"  — raw hex xpriv from an environment variable
#   "file"       — mnemonic read from a plain-text file
[ladon.derive.secret]
kind = "env"
var  = "LADON_MNEMONIC"
# Optional: BIP-39 passphrase read from a separate env var
# passphrase_var = "LADON_PASSPHRASE"

# One [[ladon.derive.chains]] section per blockchain.
[[ladon.derive.chains]]
name    = "evm"
chain   = "ethereum-mainnet"
account = 0
change  = 0
# start_index = 1   # first generated pool index when this chain has no rows

[[ladon.derive.chains]]
name        = "solana"
chain       = "solana-mainnet"
account     = 0
change      = 0
# start_index = 1
solana_mode = "cold-export"   # "full" | "cold-export" | "hsm-sim" | "pda"
# program_id = "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA"

# [[ladon.derive.chains]]
# name    = "btc"
# chain   = "bitcoin-mainnet"
# account = 0
# change  = 0
# start_index = 1
# network = "bitcoin"   # "bitcoin" | "testnet" | "signet" | "regtest"

# ── Pool daemon ─────────────────────────────────────────────────────────────────

[ladon.pool]
target        = 1000   # keep this many addresses in the pool at all times
threshold     = 200    # start refilling when the count drops below this
batch         = 100    # derive this many at a time
interval_secs = 10     # poll the database every N seconds

# ── Table / column names ────────────────────────────────────────────────────────

[ladon.table]
name = "derived_addresses"

[ladon.table.columns]
id         = "id"
chain      = "chain"
address    = "address"
path       = "path"
index      = "index"
is_used    = "is_used"
created_at = "created_at"

# ── Store (database connection) ─────────────────────────────────────────────────
# Ladon resolves [ladon].store against this required shared store entry.

[stores.ladon]
driver = "sqlite"
url = "sqlite://data/ladon/addresses.db"

# ── Shared chain references ──────────────────────────────────────────────────────
[chains.ethereum-mainnet]
caip2 = "eip155:1"

[chains.solana-mainnet]
caip2 = "solana:mainnet"

# ── Optional Postgres store (requires --features pg or --features postgres) ────
# Comment out the [stores.ladon] section above and uncomment below for Postgres.
#
# [stores.ladon]
# driver = "postgres"
# url must be a required DATABASE_URL environment reference.
# max_connections = 5 # PostgreSQL only; SQLite always uses one connection.
